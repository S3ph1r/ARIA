version: "3.8"

services:
  aria-server:
    build: .
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    env_file: .env
    ports:
      - "7860:7860"
    volumes:
      - C:\models:/models:ro
      - U:\:/aria-shared:rw
      - C:\logs\aria:/app/logs:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
version: '3.8'

services:
  aria-server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount codice sorgente per sviluppo rapido
      - ./aria_server:/app/aria_server
      - ./main.py:/app/main.py
      - ./tests:/app/tests
    environment:
      - ARIA_HOST=0.0.0.0
      - ARIA_PORT=8000
      - REDIS_HOST=192.168.1.190
      - REDIS_PORT=6379
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Restart per sviluppo
    command: python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload